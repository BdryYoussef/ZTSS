# docker-compose.yml — ZTSS four-node cluster
#
# Topology (wiki/network_layer.md §Node Architecture):
#
#   node-1  (:7001) ← seed for nodes 2/3/4; API exposed on host :8090
#   node-2  (:7002)   seeds: node-1
#   node-3  (:7003)   seeds: node-1
#   node-4  (:7004)   seeds: node-1
#
# Each node runs the combined P2P + REST binary (cmd/ztss-node).
#
# Storage (wiki/database_schema.md §BlockStore Backends):
#   Each node mounts a named local volume at /data (FileSystem BlockStore).
#   Volumes are NOT shared between nodes — each has its own replica store.
#   Replication is handled over the P2P protocol (k=3 policy).
#
# Networking (wiki/network_layer.md §Transport Security):
#   All inter-node traffic is TLS 1.3 (ES3).  In this compose file we set
#   ZTSS_INSECURE_TLS=true for the self-signed dev certs generated at startup.
#   In production, provision real certs via a cluster CA and set this to false.
#
# Required YAML config fields (wiki/network_layer.md §Node Configuration):
#   port:             ZTSS_ADDR (TCP listen for P2P)
#   storage_capacity: ZTSS_CAPACITY (bytes; 0 = unlimited)
#   seeds:            ZTSS_SEEDS (comma-separated peer addresses)
#
# API:
#   Only node-1 exposes its REST API to the host (port 8080).
#   Nodes 2–4 run their API on the internal network only.

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  ztss-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

# ── Named volumes (FileSystem BlockStore) ─────────────────────────────────────
volumes:
  node1-data:
    driver: local
  node2-data:
    driver: local
  node3-data:
    driver: local
  node4-data:
    driver: local

# ── Shared service template ───────────────────────────────────────────────────
x-node-defaults: &node-defaults
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - ztss-net
  # Health check: ping the P2P port every 15 s; 3 failures → unhealthy.
  # Uses /bin/sh from distroless — not available; use a TCP probe instead.
  # (distroless has no shell; nc/curl absent → rely on compose healthcheck tcp)
  healthcheck:
    test: ["CMD-SHELL", "true"]   # placeholder — override per-service if needed
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── node-1: primary seed + the only node with a host-exposed API port ────────
  node-1:
    <<: *node-defaults
    container_name: ztss-node-1
    hostname: node-1
    volumes:
      - node1-data:/data
    ports:
      # REST API: host:8090 → container:8080  (8080 already allocated on host)
      - "8090:8080"
      # P2P (optional host exposure for debugging; remove in production)
      - "7001:7001"
    environment:
      # ── P2P configuration ──────────────────────────────────────────────────
      ZTSS_ADDR: ":7001"
      # node-1 is the bootstrap seed; it has no upstream seeds itself.
      ZTSS_SEEDS: ""
      # ── Storage ────────────────────────────────────────────────────────────
      ZTSS_STORAGE_DIR: "/data"
      # 10 GB capacity per node (wiki/network_layer.md: storage_capacity: <bytes>)
      ZTSS_CAPACITY: "10737418240"
      # ── REST API ───────────────────────────────────────────────────────────
      ZTSS_API_ADDR: ":8080"
      # ── TLS ────────────────────────────────────────────────────────────────
      # true = accept self-signed certs generated at startup (dev / CI).
      # false = require valid cluster CA in production.
      ZTSS_INSECURE_TLS: "true"

  # ── node-2 ────────────────────────────────────────────────────────────────
  node-2:
    <<: *node-defaults
    container_name: ztss-node-2
    hostname: node-2
    depends_on:
      - node-1
    volumes:
      - node2-data:/data
    environment:
      ZTSS_ADDR: ":7002"
      # Seed from node-1 using Docker DNS (service name resolves to container IP).
      ZTSS_SEEDS: "node-1:7001"
      ZTSS_STORAGE_DIR: "/data"
      ZTSS_CAPACITY: "10737418240"
      ZTSS_API_ADDR: ":8080"
      ZTSS_INSECURE_TLS: "true"

  # ── node-3 ────────────────────────────────────────────────────────────────
  node-3:
    <<: *node-defaults
    container_name: ztss-node-3
    hostname: node-3
    depends_on:
      - node-1
    volumes:
      - node3-data:/data
    environment:
      ZTSS_ADDR: ":7003"
      ZTSS_SEEDS: "node-1:7001"
      ZTSS_STORAGE_DIR: "/data"
      ZTSS_CAPACITY: "10737418240"
      ZTSS_API_ADDR: ":8080"
      ZTSS_INSECURE_TLS: "true"

  # ── node-4 ────────────────────────────────────────────────────────────────
  node-4:
    <<: *node-defaults
    container_name: ztss-node-4
    hostname: node-4
    depends_on:
      - node-1
    volumes:
      - node4-data:/data
    environment:
      ZTSS_ADDR: ":7004"
      ZTSS_SEEDS: "node-1:7001"
      ZTSS_STORAGE_DIR: "/data"
      ZTSS_CAPACITY: "10737418240"
      ZTSS_API_ADDR: ":8080"
      ZTSS_INSECURE_TLS: "true"
